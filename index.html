<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゲームショップ</title>

    <style>
        body {
            font-family: sans-serif;
            background: #f2f2f2;
            text-align: center;
            margin: 0;
        }

        h1 {
            background: #333;
            color: white;
            padding: 15px;
            margin: 0;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px;
        }

        .item {
            background: white;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            width: 200px;
        }

        .name {
            font-size: 18px;
        }

        .price {
            color: #666;
        }

        .qty {
            font-size: 20px;
            margin: 10px;
            display: inline-block;
            width: 40px;
        }

        button {
            font-size: 16px;
            padding: 8px 12px;
            margin: 3px;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }

        .minus {
            background: #e74c3c;
        }

        .checkout {
            background: #2196F3;
            font-size: 20px;
            width: 80%;
            margin: 10px;
        }

        .totalBox {
            background: white;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            font-size: 22px;
        }

        .salesBox {
            background: white;
            margin: 10px;
            padding: 10px;
            border-radius: 10px;
        }

        .log {
            background: #fafafa;
            margin: 5px;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
        }

        select,
        input {
            font-size: 18px;
            padding: 5px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <h1>ゲームショップ</h1>

    <div class="salesBox">
        管理者ログイン<br>
        <input type="password" id="adminPass">
        <button onclick="adminLogin()">ログイン</button>
        <span id="adminStatus"></span>
    </div>

    <div class="container" id="shop"></div>

    <div class="totalBox">
        合計: <span id="total">0</span> G
    </div>

    <div class="salesBox">
        担当者<br>

        <select id="staff">

            <option>スタッフ選択</option>
            <option>ハイド</option>
            <option>ナイン</option>
            <option>ひなた</option>
            <option>ココノエユウカ</option>
            <option>かいと</option>
            <option>7</option>
            <option>天月</option>
            <option>りん</option>
            <option>蓮</option>
            <option>ヒイラギべに</option>
            <option>唯乃</option>
            <option>こう</option>
            <option>レッド・タンジェリン</option>

        </select>

    </div>

    <button class="checkout" onclick="checkout()">決済</button>

    <div class="salesBox">

        今日の売上: <span id="todaySales">0</span> G<br>
        1週間の売上: <span id="weekSales">0</span> G

    </div>

    <div class="salesBox">
        <h3>スタッフ売上ランキング</h3>
        <div id="staffRank"></div>
    </div>

    <div class="salesBox">

        <button onclick="downloadCSV()">CSVダウンロード</button>
        <button onclick="resetSales()">売上リセット</button>

    </div>

    <div class="salesBox">
        <h3>今日の売上ログ</h3>
        <div id="logList"></div>
    </div>

    <script>

        let ADMIN_PASSWORD = "ADMIN123";
        let isAdmin = false;

        let items = [

            { name: "ローストビーフ", price: 120000, qty: 0 },
            { name: "ローストビーフ(白)", price: 60000, qty: 0 },
            { name: "h666", price: 120000, qty: 0 },
            { name: "h666(白)", price: 60000, qty: 0 }

        ];

        function adminLogin() {

            let pass = document.getElementById("adminPass").value;

            if (pass === ADMIN_PASSWORD) {

                isAdmin = true;
                document.getElementById("adminStatus").textContent = "管理者ログイン中";

            } else {

                alert("パスワードが違います");

            }

        }

        function render() {

            const shop = document.getElementById("shop");
            shop.innerHTML = "";

            items.forEach((item, i) => {

                let div = document.createElement("div");

                div.className = "item";

                div.innerHTML = `

<div class="name">${item.name}</div>
<div class="price">${item.price} G</div>

<button class="minus" onclick="changeQty(${i},-10)">-10</button>
<button class="minus" onclick="changeQty(${i},-1)">-1</button>

<span class="qty">${item.qty}</span>

<button onclick="changeQty(${i},1)">+1</button>
<button onclick="changeQty(${i},10)">+10</button>

`;

                shop.appendChild(div);

            });

            updateTotal();

        }

        function changeQty(index, amount) {

            items[index].qty += amount;

            if (items[index].qty < 0) items[index].qty = 0;

            render();

        }

        function updateTotal() {

            let total = 0;

            items.forEach(item => {

                total += item.price * item.qty;

            });

            document.getElementById("total").textContent = total;

        }

        function getToday() {

            return new Date().toISOString().slice(0, 10);

        }

        function checkout() {

            let total = Number(document.getElementById("total").textContent);

            if (total === 0) {

                alert("商品を選んでください");
                return;

            }

            let staff = document.getElementById("staff").value;

            let sales = JSON.parse(localStorage.getItem("sales") || "{}");

            let today = getToday();

            if (!sales[today]) sales[today] = [];

            sales[today].push({

                time: new Date().toLocaleTimeString(),
                amount: total,
                staff: staff

            });

            localStorage.setItem("sales", JSON.stringify(sales));

            items.forEach(item => item.qty = 0);

            render();

            updateSales();

        }

        function updateSales() {

            let sales = JSON.parse(localStorage.getItem("sales") || "{}");

            let today = getToday();

            let todayTotal = 0;
            let weekTotal = 0;

            let staffRank = {};

            let now = new Date();

            for (let i = 0; i < 7; i++) {

                let d = new Date(now);
                d.setDate(now.getDate() - i);

                let key = d.toISOString().slice(0, 10);

                if (sales[key]) {

                    sales[key].forEach(s => {

                        weekTotal += s.amount;

                        staffRank[s.staff] = (staffRank[s.staff] || 0) + s.amount;

                    });

                }

            }

            if (sales[today]) {

                sales[today].forEach(s => {

                    todayTotal += s.amount;

                });

            }

            document.getElementById("todaySales").textContent = todayTotal;
            document.getElementById("weekSales").textContent = weekTotal;

            renderRanking(staffRank);
            renderLogs();

        }

        function renderRanking(rank) {

            let arr = Object.entries(rank);

            arr.sort((a, b) => b[1] - a[1]);

            let div = document.getElementById("staffRank");

            div.innerHTML = "";

            arr.forEach(r => {

                let el = document.createElement("div");

                el.textContent = r[0] + " : " + r[1] + "G";

                div.appendChild(el);

            });

        }

        function renderLogs() {

            let sales = JSON.parse(localStorage.getItem("sales") || "{}");

            let today = getToday();

            const logList = document.getElementById("logList");

            logList.innerHTML = "";

            if (!sales[today]) return;

            sales[today].forEach((log, index) => {

                let div = document.createElement("div");

                div.className = "log";

                div.innerHTML = `

${log.time} - ${log.amount}G (${log.staff})

<button onclick="editLog(${index})">修正</button>
<button onclick="deleteLog(${index})">削除</button>

`;

                logList.appendChild(div);

            });

        }

        function editLog(index) {

            if (!isAdmin) {

                alert("管理者のみ編集できます");
                return;

            }

            let sales = JSON.parse(localStorage.getItem("sales") || "{}");

            let today = getToday();

            let newAmount = prompt("金額修正", sales[today][index].amount);

            if (newAmount === null) return;

            sales[today][index].amount = Number(newAmount);

            localStorage.setItem("sales", JSON.stringify(sales));

            updateSales();

        }

        function deleteLog(index) {

            if (!isAdmin) {

                alert("管理者のみ削除できます");
                return;

            }

            let sales = JSON.parse(localStorage.getItem("sales") || "{}");

            let today = getToday();

            sales[today].splice(index, 1);

            localStorage.setItem("sales", JSON.stringify(sales));

            updateSales();

        }

        function resetSales() {

            if (!isAdmin) {

                alert("管理者のみリセットできます");
                return;

            }

            if (confirm("売上をすべて削除しますか？")) {

                localStorage.removeItem("sales");

                updateSales();

            }

        }

        function downloadCSV() {

            let sales = JSON.parse(localStorage.getItem("sales") || "{}");

            let csv = "日付,時間,スタッフ,金額\n";

            for (let date in sales) {

                sales[date].forEach(s => {

                    csv += `${date},${s.time},${s.staff},${s.amount}\n`;

                });

            }

            let blob = new Blob([csv]);

            let a = document.createElement("a");

            a.href = URL.createObjectURL(blob);

            a.download = "sales.csv";

            a.click();

        }

        render();
        updateSales();

    </script>

</body>

</html>
