<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゲームショップ</title>

    <style>
        body {
            font-family: sans-serif;
            background: #f2f2f2;
            text-align: center;
            margin: 0;
        }

        h1 {
            background: #333;
            color: white;
            padding: 15px;
            margin: 0;
        }

        .container {
            padding: 10px;
        }

        .item {
            background: white;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .name {
            font-size: 18px;
        }

        .price {
            color: #666;
        }

        .qty {
            font-size: 20px;
            margin: 10px;
            display: inline-block;
            width: 40px;
        }

        button {
            font-size: 16px;
            padding: 8px 12px;
            margin: 3px;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
        }

        .minus {
            background: #e74c3c;
        }

        .checkout {
            background: #2196F3;
            font-size: 20px;
            width: 80%;
            margin: 10px;
        }

        .totalBox {
            background: white;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            font-size: 22px;
        }

        .salesBox {
            background: white;
            margin: 10px;
            padding: 10px;
            border-radius: 10px;
        }

        .log {
            background: #fafafa;
            margin: 5px;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
        }

        select {
            font-size: 18px;
            padding: 5px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <h1>ゲームショップ</h1>

    <div class="container" id="shop"></div>

    <div class="totalBox">
        合計: <span id="total">0</span> G
    </div>

    <div class="salesBox">
        担当者:<br>
        <select id="staff">
            <option value="スタッフ選択">スタッフ選択</option>
            <option value="ハイド">ハイド</option>
            <option value="ナイン">ナイン</option>
            <option value="ひなた">ひなた</option>
            <option value="ココノエユウカ">ココノエユウカ</option>
            <option value="かいと">かいと</option>
            <option value="7">7</option>
            <option value="天月">天月</option>
            <option value="りん">りん</option>
            <option value="蓮">蓮</option>
            <option value="ヒイラギべに">ヒイラギべに</option>
            <option value="唯乃">唯乃</option>
            <option value="こう">こう</option>
            <option value="レッド・タンジェリン">レッド・タンジェリン</option>

        </select>
    </div>

    <button class="checkout" onclick="checkout()">決済</button>

    <div class="salesBox">
        今日の売上: <span id="todaySales">0</span> G<br>
        1週間の売上: <span id="weekSales">0</span> G
    </div>

    <div class="salesBox">
        <h3>今日の売上ログ</h3>
        <div id="logList"></div>
    </div>

    <script>

        let items = [
            { name: "ローストビーフ", price: 120000, qty: 0 },
            { name: "ローストビーフ(白)", price: 60000, qty: 0 },
            { name: "h666", price: 120000, qty: 0 },
            { name: "h666(白)", price: 60000, qty: 0 }
        ];

        function render() {

            const shop = document.getElementById("shop");
            shop.innerHTML = "";

            items.forEach((item, i) => {

                let div = document.createElement("div");
                div.className = "item";

                div.innerHTML = `

<div class="name">${item.name}</div>
<div class="price">${item.price} G</div>

<button class="minus" onclick="changeQty(${i},-10)">-10</button>
<button class="minus" onclick="changeQty(${i},-1)">-1</button>

<span class="qty">${item.qty}</span>

<button onclick="changeQty(${i},1)">+1</button>
<button onclick="changeQty(${i},10)">+10</button>

`;

                shop.appendChild(div);

            });

            updateTotal();

        }

        function changeQty(index, amount) {

            items[index].qty += amount;

            if (items[index].qty < 0) {
                items[index].qty = 0;
            }

            render();

        }

        function updateTotal() {

            let total = 0;

            items.forEach(item => {
                total += item.price * item.qty;
            });

            document.getElementById("total").textContent = total;

        }

        function getToday() {
            return new Date().toISOString().slice(0, 10);
        }

        function checkout() {

            let total = Number(document.getElementById("total").textContent);

            if (total === 0) {
                alert("商品を選んでください");
                return;
            }

            let staff = document.getElementById("staff").value;

            let sales = JSON.parse(localStorage.getItem("sales") || "{}");
            let today = getToday();

            if (!sales[today]) {
                sales[today] = [];
            }

            sales[today].push({
                time: new Date().toLocaleTimeString(),
                amount: total,
                staff: staff
            });

            localStorage.setItem("sales", JSON.stringify(sales));

            items.forEach(item => item.qty = 0);

            render();

            updateSales();

        }

        function updateSales() {

            let sales = JSON.parse(localStorage.getItem("sales") || "{}");

            let today = getToday();

            let todayTotal = 0;
            let weekTotal = 0;

            let now = new Date();

            for (let i = 0; i < 7; i++) {

                let d = new Date(now);
                d.setDate(now.getDate() - i);
                let key = d.toISOString().slice(0, 10);

                if (sales[key]) {

                    sales[key].forEach(s => {
                        weekTotal += s.amount;
                    });

                }

            }

            if (sales[today]) {
                sales[today].forEach(s => {
                    todayTotal += s.amount;
                });
            }

            document.getElementById("todaySales").textContent = todayTotal;
            document.getElementById("weekSales").textContent = weekTotal;

            renderLogs();

        }

        function renderLogs() {

            let sales = JSON.parse(localStorage.getItem("sales") || "{}");
            let today = getToday();

            const logList = document.getElementById("logList");
            logList.innerHTML = "";

            if (!sales[today]) return;

            sales[today].forEach((log, index) => {

                let div = document.createElement("div");
                div.className = "log";

                div.innerHTML = `
${log.time} - ${log.amount}G (${log.staff})
<button onclick="editLog(${index})">修正</button>
<button onclick="deleteLog(${index})">削除</button>
`;

                logList.appendChild(div);

            });

        }

        function editLog(index) {

            let sales = JSON.parse(localStorage.getItem("sales") || "{}");
            let today = getToday();

            let newAmount = prompt("金額を修正", sales[today][index].amount);

            if (newAmount === null) return;

            sales[today][index].amount = Number(newAmount);

            localStorage.setItem("sales", JSON.stringify(sales));

            updateSales();

        }

        function deleteLog(index) {

            let sales = JSON.parse(localStorage.getItem("sales") || "{}");
            let today = getToday();

            sales[today].splice(index, 1);

            localStorage.setItem("sales", JSON.stringify(sales));

            updateSales();

        }

        render();
        updateSales();

    </script>

</body>

</html>
