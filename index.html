<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>inferno 価格計算</title>

    <style>
        body {
            font-family: sans-serif;
            background: #f2f2f2;
            text-align: center;
            margin: 0;
        }

        h1 {
            background: #a10e0e;
            color: white;
            padding: 15px;
            margin: 0;
        }

        .tabs button {
            padding: 10px;
            margin: 5px;
            font-size: 16px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px;
        }

        .item {
            background: white;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            width: 200px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .price {
            color: #777;
        }

        .qty {
            font-size: 20px;
            margin: 10px;
            display: inline-block;
            width: 40px;
        }

        button {
            font-size: 16px;
            padding: 8px 12px;
            margin: 3px;
            border: none;
            border-radius: 8px;
            background: #1fe63a;
            color: white;
            cursor: pointer;
        }

        .minus {
            background: #e74c3c;
        }

        .checkout {
            background: #2196F3;
            font-size: 20px;
            width: 80%;
            margin: 10px;
        }

        .box {
            background: white;
            padding: 10px;
            margin: 10px;
            border-radius: 10px;
        }

        .log {
            background: #fafafa;
            margin: 5px;
            padding: 8px;
            border-radius: 6px;
        }
    </style>
</head>

<body>

    <h1>inferno 価格計算</h1>

    <div class="box">

        変更許可パス<br>
        <input type="password" id="adminPass">
        <button onclick="adminLogin()">変更申請</button>
        <span id="adminStatus"></span>

    </div>

    <div class="box">

        担当者<br>

        <select id="staff">
            <option>スタッフ選択</option>
            <option>ハイド</option>
            <option>ナイン</option>
            <option>蓮</option>
            <option>ひなた</option>
            <option>かいと</option>
            <option>7</option>
            <option>天月</option>
            <option>りん</option>
            <option>ココノエユウカ</option>
            <option>ヒイラギべに</option>
            <option>こう</option>
            <option>唯乃</option>
            <option>レッド・タンジェリン</option>
        </select>

    </div>

    <div class="tabs">

        <button onclick="changeTab('30')">30%回復</button>
        <button onclick="changeTab('50')">50%回復</button>
        <button onclick="changeTab('white')">白</button>
        <button onclick="changeTab('event')">イベント</button>

    </div>

    <div id="shop" class="container"></div>

    <div class="box">
        合計: <span id="total">0</span> 円
    </div>

    <button class="checkout" onclick="checkout()">決済</button>

    <div class="box">

        今日の売上: <span id="todaySales">0</span> 円<br>
        1週間の売上: <span id="weekSales">0</span> 円

    </div>

    <div class="box">

        <h3>スタッフランキング</h3>
        <div id="ranking"></div>

    </div>

    <div class="box">

        <button onclick="downloadCSV()">CSVダウンロード</button>
        <button onclick="resetSales()">売上リセット</button>

    </div>

    <div class="box">

        <h3>今日の売上ログ</h3>
        <div id="logList"></div>

    </div>

    <script>

        let ADMIN_PASSWORD = "イズミーランド";
        let isAdmin = false;

        let currentTab = "30";

        let items = [

            { name: "オニポテ", price: 80000, qty: 0, tab: "30" },
            { name: "DROP OF THE DEVIL", price: 80000, qty: 0, tab: "30" },

            { name: "h666", price: 120000, qty: 0, tab: "50" },
            { name: "DIABLE ROUGE", price: 120000, qty: 0, tab: "50" },
            { name: "ローストビーフ", price: 120000, qty: 0, tab: "50" },
            { name: "LILITH FROST", price: 120000, qty: 0, tab: "50" },

            { name: "オニポテ(白)", price: 40000, qty: 0, tab: "white" },
            { name: "DROP OF THE DEVIL(白)", price: 40000, qty: 0, tab: "white" },
            { name: "ローストビーフ(白)", price: 60000, qty: 0, tab: "white" },
            { name: "h666(白)", price: 60000, qty: 0, tab: "white" },
            { name: "DIABLE ROUGE(白)", price: 60000, qty: 0, tab: "white" },
            { name: "LILITH FROST(白)", price: 60000, qty: 0, tab: "white" },

            { name: "イベント商品", price: 200000, qty: 0, tab: "event" }

        ];

        function format(num) {
            return num.toLocaleString("ja-JP");
        }

        function adminLogin() {

            let pass = document.getElementById("adminPass").value;

            if (pass === ADMIN_PASSWORD) {

                isAdmin = true;
                document.getElementById("adminStatus").textContent = "変更可能";
                updateSales();

            } else {

                alert("勝手に変えようとしないでね～");

            }

        }

        function changeTab(tab) {

            currentTab = tab;
            render();

        }

        function render() {

            const shop = document.getElementById("shop");
            shop.innerHTML = "";

            items.forEach((item, i) => {

                if (item.tab !== currentTab) return;

                let div = document.createElement("div");
                div.className = "item";

                div.innerHTML = `

<div>${item.name}</div>
<div class="price">${format(item.price)} 円</div>

<button class="minus" onclick="changeQty(${i},-10)">-10</button>
<button class="minus" onclick="changeQty(${i},-1)">-1</button>

<span class="qty">${item.qty}</span>

<button onclick="changeQty(${i},1)">+1</button>
<button onclick="changeQty(${i},10)">+10</button>

`;

                shop.appendChild(div);

            });

            updateTotal();

        }

        function changeQty(index, amount) {

            items[index].qty += amount;

            if (items[index].qty < 0) items[index].qty = 0;

            render();

        }

        function updateTotal() {

            let total = 0;

            items.forEach(i => {

                total += i.price * i.qty;

            });

            document.getElementById("total").textContent = format(total);

        }

        function today() {

            return new Date().toISOString().slice(0, 10);

        }

        function checkout() {

            let total = 0;

            items.forEach(i => {

                total += i.price * i.qty;

            });

            if (total === 0) {

                alert("商品選択してください");
                return;

            }

            let staff = document.getElementById("staff").value;

            let sales = JSON.parse(localStorage.getItem("sales") || "{}");

            let t = today();

            if (!sales[t]) sales[t] = [];

            sales[t].push({

                time: new Date().toLocaleTimeString(),
                amount: total,
                staff: staff

            });

            localStorage.setItem("sales", JSON.stringify(sales));

            items.forEach(i => i.qty = 0);

            render();
            updateSales();

        }

        function updateSales() {

            let sales = JSON.parse(localStorage.getItem("sales") || "{}");

            let t = today();

            let todayTotal = 0;
            let weekTotal = 0;

            let rank = {};

            let now = new Date();

            for (let i = 0; i < 7; i++) {

                let d = new Date(now);
                d.setDate(now.getDate() - i);

                let key = d.toISOString().slice(0, 10);

                if (sales[key]) {

                    sales[key].forEach(s => {

                        weekTotal += s.amount;
                        rank[s.staff] = (rank[s.staff] || 0) + s.amount;

                    });

                }

            }

            if (sales[t]) {

                sales[t].forEach(s => todayTotal += s.amount);

            }

            document.getElementById("todaySales").textContent = format(todayTotal);
            document.getElementById("weekSales").textContent = format(weekTotal);

            renderRanking(rank);
            renderLogs();

        }

        function renderRanking(rank) {

            let arr = Object.entries(rank);

            arr.sort((a, b) => b[1] - a[1]);

            let div = document.getElementById("ranking");
            div.innerHTML = "";

            arr.forEach(r => {

                let d = document.createElement("div");
                d.textContent = r[0] + " : " + format(r[1]) + " 円";
                div.appendChild(d);

            });

        }

        function renderLogs() {

            let sales = JSON.parse(localStorage.getItem("sales") || "{}");

            let t = today();

            let logList = document.getElementById("logList");

            logList.innerHTML = "";

            if (!sales[t]) return;

            sales[t].forEach((log, index) => {

                let buttons = "";

                if (isAdmin) {

                    buttons = `
<button onclick="editLog(${index})">修正</button>
<button onclick="deleteLog(${index})">削除</button>
`;

                }

                let div = document.createElement("div");

                div.className = "log";

                div.innerHTML = `
${log.time} - ${format(log.amount)}円 (${log.staff})
${buttons}
`;

                logList.appendChild(div);

            });

        }

        function editLog(index) {

            let sales = JSON.parse(localStorage.getItem("sales") || "{}");

            let t = today();

            let newAmount = prompt("金額修正", sales[t][index].amount);

            if (newAmount === null) return;

            sales[t][index].amount = Number(newAmount);

            localStorage.setItem("sales", JSON.stringify(sales));

            updateSales();

        }

        function deleteLog(index) {

            let sales = JSON.parse(localStorage.getItem("sales") || "{}");

            let t = today();

            sales[t].splice(index, 1);

            localStorage.setItem("sales", JSON.stringify(sales));

            updateSales();

        }

        function resetSales() {

            if (!isAdmin) {

                alert("管理者のみ");
                return;

            }

            if (confirm("売上削除しますか？")) {

                localStorage.removeItem("sales");

                updateSales();

            }

        }

        function downloadCSV() {

            let sales = JSON.parse(localStorage.getItem("sales") || "{}");

            let csv = "日付,時間,スタッフ,金額\n";

            for (let d in sales) {

                sales[d].forEach(s => {

                    csv += `${d},${s.time},${s.staff},${s.amount}\n`;

                });

            }

            let blob = new Blob([csv]);

            let a = document.createElement("a");

            a.href = URL.createObjectURL(blob);

            a.download = "sales.csv";

            a.click();

        }

        render();
        updateSales();

    </script>

</body>

</html>
